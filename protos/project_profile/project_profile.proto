syntax = "proto3";

package project_profile.project_profile;

option go_package = "/projectprofilepb;projectprofilepb";

import "project_profile/common.proto";
import "project_profile/requests.proto";

service ProjectProfileService {
  rpc CreateProjectProfile(CreateProjectRequest) returns (.project_profile.common.CreateProjectResponse);
  rpc CreateProjectProfileProperty(CreateProjectPropertyRequest) returns (.project_profile.common.CreateProjectResponse);

}