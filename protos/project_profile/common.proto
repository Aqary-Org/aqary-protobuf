syntax = "proto3";

package project_profile.common;

option go_package = "/projectprofilepb;projectprofilepb";

message HttpResponse {
  string msg = 1;
  uint32 httpcode = 2;
}

message ValidationError {
  string field = 1;
  string message = 2;
}

message UserDetail {
  int64 company_id = 1;
  int64 user_id = 2;
  string username = 3;
}

message CreateProjectResponse {
  // "success" or "error"
  string status = 2;
  // e.g. "VALIDATION_ERROR" when status = "error"
  string code = 3;
  // e.g. "One or more listings failed validation."
  string message = 4;
  // Populated only when there are validation errors
  repeated ValidationError errors = 5;
}
