syntax = "proto3";

package common;

option go_package = "/commonpb;commonpb";

message HttpResponse {
  string msg = 1;
  uint32 httpcode = 2;
}

message ValidationError {
  string field = 1;
  string message = 2;
}

message UserDetail {
  int64 company_id = 1;
  int64 user_id = 2;
  string username = 3;
}