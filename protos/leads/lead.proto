syntax = "proto3";

option go_package = "/leadpb;leadpb";

package leads;

import "leads/common.proto";

service LeadService {
  rpc CreateLead(CreateLeadRequest) returns (CreateLeadResponse);
}

message CreateLeadRequest {
  string lead_name = 1;
  string email = 2;
  string phone = 3;
  leads.common.UserDetail user_detail = 4;
  string source = 5;
  string sub_source = 6;
}

message CreateLeadResponse {
  string data = 1;
}